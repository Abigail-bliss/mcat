<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WizePrep Chapter Reference</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f3f0;
    --surface: #ffffff;
    --surface2: #f8f7f5;
    --border: #e2e0db;
    --text: #1a1a1f;
    --muted: #8a8a96;
    --cpf1-bg: #f3e8ff; --cpf1: #7c3aed;
    --cpf2-bg: #e0f2fe; --cpf2: #0369a1;
    --bbf1-bg: #d1fae5; --bbf1: #059669;
    --bbf2-bg: #fef3c7; --bbf2: #d97706;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 48px 32px;
  }

  header { max-width: 980px; margin: 0 auto 28px; }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.8rem;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  .filter-bar {
    max-width: 980px;
    margin: 0 auto 36px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    padding: 8px 20px;
    border-radius: 999px;
    border: 2px solid;
    cursor: pointer;
    transition: all 0.15s ease;
    background: transparent;
  }

  .filter-btn[data-vol="cpf1"]        { border-color: var(--cpf1); color: var(--cpf1); }
  .filter-btn[data-vol="cpf1"].active { background: var(--cpf1-bg); }
  .filter-btn[data-vol="cpf2"]        { border-color: var(--cpf2); color: var(--cpf2); }
  .filter-btn[data-vol="cpf2"].active { background: var(--cpf2-bg); }
  .filter-btn[data-vol="bbf1"]        { border-color: var(--bbf1); color: var(--bbf1); }
  .filter-btn[data-vol="bbf1"].active { background: var(--bbf1-bg); }
  .filter-btn[data-vol="bbf2"]        { border-color: var(--bbf2); color: var(--bbf2); }
  .filter-btn[data-vol="bbf2"].active { background: var(--bbf2-bg); }

  #container { max-width: 980px; margin: 0 auto; display: grid; gap: 36px; }

  .volume-block {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .volume-header {
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .vol-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 999px;
  }

  .cpf1 .vol-badge { background: var(--cpf1-bg); color: var(--cpf1); border: 1px solid #7c3aed44; }
  .cpf2 .vol-badge { background: var(--cpf2-bg); color: var(--cpf2); border: 1px solid #0369a144; }
  .bbf1 .vol-badge { background: var(--bbf1-bg); color: var(--bbf1); border: 1px solid #05966944; }
  .bbf2 .vol-badge { background: var(--bbf2-bg); color: var(--bbf2); border: 1px solid #d9770644; }

  .volume-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    font-weight: 400;
  }

  /* Chapter row grid: ch# | run# | page | name | assigned | due | checkbox | arrow */
  .ch-grid {
    display: grid;
    grid-template-columns: 70px 82px 52px 1fr 100px 100px 40px 20px;
    align-items: center;
    padding: 0 28px;
  }

  .col-headers {
    padding-top: 9px;
    padding-bottom: 9px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .col-header {
    font-family: 'DM Mono', monospace;
    font-size: 0.63rem;
    font-weight: 500;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .col-header.center { text-align: center; }
  .col-header.pad    { padding-left: 8px; }

  details.chapter-item { border-top: 1px solid var(--border); }

  details.chapter-item > summary {
    list-style: none;
    cursor: pointer;
    padding-top: 12px;
    padding-bottom: 12px;
    transition: background 0.1s;
  }

  details.chapter-item > summary::-webkit-details-marker { display: none; }
  details.chapter-item > summary::marker { display: none; }
  details.chapter-item > summary:hover   { background: var(--surface2); }
  details.chapter-item[open] > summary   { background: var(--surface2); }

  .ch-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .run-wrap { display: flex; justify-content: center; }

  .running-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 6px;
    display: inline-block;
  }

  .cpf1 .running-num { background: var(--cpf1-bg); color: var(--cpf1); }
  .cpf2 .running-num { background: var(--cpf2-bg); color: var(--cpf2); }
  .bbf1 .running-num { background: var(--bbf1-bg); color: var(--bbf1); }
  .bbf2 .running-num { background: var(--bbf2-bg); color: var(--bbf2); }

  .page-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
  }

  .chapter-name {
    color: var(--text);
    font-size: 0.88rem;
    line-height: 1.45;
    padding-left: 8px;
    transition: opacity 0.15s;
  }

  .ch-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
    transition: opacity 0.15s;
  }

  .ch-check-wrap {
    display: flex;
    justify-content: center;
  }

  .expand-icon {
    color: var(--muted);
    font-size: 0.6rem;
    transition: transform 0.2s ease;
    text-align: right;
  }

  details[open] .expand-icon { transform: rotate(90deg); }

  /* Chapter done state — only affects the name and dates in the summary */
  details.chapter-done > summary .chapter-name {
    opacity: 0.38;
    text-decoration: line-through;
    text-decoration-color: var(--muted);
  }
  details.chapter-done > summary .ch-date { opacity: 0.38; }

  /* Subtopic table */
  .subtopics {
    background: var(--surface2);
    border-top: 1px solid var(--border);
    padding: 4px 28px 12px 28px;
  }

  .subtopic-table {
    width: 100%;
    border-collapse: collapse;
  }

  .subtopic-table td {
    padding: 5px 8px;
    font-size: 0.82rem;
    line-height: 1.45;
    vertical-align: middle;
    border-bottom: 1px solid #e2e0db44;
  }

  .subtopic-table tr:last-child td { border-bottom: none; }
  .subtopic-table tbody tr:hover td { background: rgba(0,0,0,0.018); }

  .subtopic-table td.td-check {
    width: 32px;
    text-align: center;
  }

  .subtopic-table tbody tr.done td { opacity: 0.38; }

  .subtopic-table tbody tr.done td.td-topic {
    text-decoration: line-through;
    text-decoration-color: var(--muted);
  }

  input[type="checkbox"] {
    width: 14px;
    height: 14px;
    cursor: pointer;
    accent-color: var(--text);
    flex-shrink: 0;
  }

  @media (max-width: 700px) {
    body { padding: 24px 16px; }
    .ch-grid { grid-template-columns: 60px 70px 48px 1fr 40px 20px; }
    .ch-date { display: none; }
    .col-header.hide-mobile { display: none; }
  }
</style>
</head>

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function topicKey(volId, chNum, idx)  { return `wz-${volId}-ch${chNum}-t${idx}`; }
function chapterKey(volId, chNum)     { return `wz-${volId}-ch${chNum}-chapter`; }

function buildVolume(vol) {
  const div = document.createElement('div');
  div.className = `volume-block ${vol.id}`;
  div.dataset.vol = vol.id;

  // Header
  const header = document.createElement('div');
  header.className = 'volume-header';
  header.innerHTML = `<span class="vol-badge">${esc(vol.badge)}</span><span class="volume-title">${esc(vol.title)}</span>`;
  div.appendChild(header);

  // Column headers
  const colHeaders = document.createElement('div');
  colHeaders.className = 'col-headers ch-grid';
  colHeaders.innerHTML = `
    <span class="col-header">Vol. Ch.</span>
    <span class="col-header center">${esc(vol.runLabel)}</span>
    <span class="col-header center">Page</span>
    <span class="col-header pad">Chapter Name</span>
    <span class="col-header hide-mobile">Assigned</span>
    <span class="col-header hide-mobile">Due</span>
    <span class="col-header center">Done</span>
    <span></span>
  `;
  div.appendChild(colHeaders);

  vol.chapters.forEach(ch => {
    const details = document.createElement('details');
    details.className = 'chapter-item';

    // Chapter checkbox key
    const cKey = chapterKey(vol.id, ch.ch);

    // Summary
    const summary = document.createElement('summary');
    summary.innerHTML = `<div class="ch-grid">
      <span class="ch-num">Ch.&nbsp;${ch.ch}</span>
      <span class="run-wrap"><span class="running-num">${ch.run}</span></span>
      <span class="page-num">${ch.page}</span>
      <span class="chapter-name">${esc(ch.name)}</span>
      <span class="ch-date hide-mobile">${ch.assigned}</span>
      <span class="ch-date hide-mobile">${ch.due}</span>
      <span class="ch-check-wrap"><input type="checkbox" class="ch-checkbox" data-key="${cKey}" aria-label="Mark chapter done"></span>
      <span class="expand-icon">&#9654;</span>
    </div>`;
    details.appendChild(summary);

    // Subtopics
    const subtopics = document.createElement('div');
    subtopics.className = 'subtopics';

    let rows = '';
    ch.topics.forEach((topic, i) => {
      const tKey = topicKey(vol.id, ch.ch, i);
      rows += `<tr data-key="${tKey}">
        <td class="td-check"><input type="checkbox" data-key="${tKey}" aria-label="${esc(topic)}"></td>
        <td class="td-topic">${esc(topic)}</td>
      </tr>`;
    });

    subtopics.innerHTML = `<table class="subtopic-table"><tbody>${rows}</tbody></table>`;
    details.appendChild(subtopics);
    div.appendChild(details);
  });

  return div;
}

function render() {
  const container = document.getElementById('container');
  VOLUMES.forEach(vol => container.appendChild(buildVolume(vol)));
  restoreState();
  attachListeners();
}

function restoreState() {
  // Subtopic checkboxes
  document.querySelectorAll('input[data-key^="wz-"]:not(.ch-checkbox)').forEach(cb => {
    if (localStorage.getItem(cb.dataset.key) === 'true') {
      cb.checked = true;
      cb.closest('tr').classList.add('done');
    }
  });
  // Chapter checkboxes
  document.querySelectorAll('input.ch-checkbox').forEach(cb => {
    if (localStorage.getItem(cb.dataset.key) === 'true') {
      cb.checked = true;
      cb.closest('details').classList.add('chapter-done');
    }
  });
}

function attachListeners() {
  // Subtopic checkboxes
  document.querySelectorAll('input[data-key^="wz-"]:not(.ch-checkbox)').forEach(cb => {
    cb.addEventListener('change', function() {
      localStorage.setItem(this.dataset.key, this.checked);
      this.closest('tr').classList.toggle('done', this.checked);
    });
  });

  // Chapter checkboxes — stop propagation so clicking doesn't toggle details
  document.querySelectorAll('input.ch-checkbox').forEach(cb => {
    cb.addEventListener('click', e => e.stopPropagation());
    cb.addEventListener('change', function() {
      localStorage.setItem(this.dataset.key, this.checked);
      this.closest('details').classList.toggle('chapter-done', this.checked);
    });
  });
}

render();

// Volume filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    const block = document.querySelector(`.volume-block[data-vol="${btn.dataset.vol}"]`);
    if (block) block.style.display = btn.classList.contains('active') ? '' : 'none';
  });
});
</script>
</body>
</html>
